name: Deploying to Live

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Site (SSH / rsync)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy theme via SSH (rsync)
        uses: SamKirkland/web-deploy@v1
        with:
          target-server: ${{ secrets.MAIN_SERVER_IP }}
          remote-user: ${{ secrets.MAIN_FTP_USERNAME }}
          private-ssh-key: ${{ secrets.MAIN_SSH_PRIVATE_KEY }}
          ssh-port: 65002

          # Local folder in repo
          source-path: ./wp-content/themes/expand/

          # LIVE site path on Hostinger (based on your SSH output)
          destination-path: /home/u210554530/domains/bcgexpand.com/public_html/wp-content/themes/expand/

          # Keep remote in sync (including deletions)
          rsync-options: >
            --archive
            --verbose
            --compress
            --human-readable
            --exclude=.git*
            --exclude=.github/
            --exclude=node_modules/
            --exclude=*.map
